<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/static/style.css"><title>PiStreamer</title></head><body><header><h1>PiStreamer</h1><nav><a href="/settings-menu">Einstellungen</a><a href="/logout">Abmelden</a></nav></header><main><section class="card hero"><div><span id="dot" class="dot"></span><strong id="state">Lade …</strong></div><div id="uptime" class="muted">00:00:00</div></section><section class="grid"><article class="card"><span>CPU</span><strong id="cpu">–</strong></article><article class="card"><span>RAM</span><strong id="ram">–</strong></article><article class="card"><span>Temperatur</span><strong id="temp">–</strong></article></section><section class="grid"><article class="card"><span>Stream-Gesundheit</span><strong id="health">–</strong><small id="health-message" class="muted"></small></article><article class="card"><span>Upload aktuell</span><strong id="upload">–</strong></article><article class="card"><span>Profil</span><strong id="profile">–</strong></article><article class="card"><span>Reconnects / Drops</span><strong id="stream-errors">0 / 0</strong></article></section><section class="actions"><button onclick="action('start')">▶ Start</button><button id="pause-button" class="secondary" onclick="togglePause()" disabled>⏸ Pause</button><button class="danger" onclick="action('stop')">■ Stop</button><button class="secondary" onclick="action('restart')">↻ Neustart</button></section><section class="card"><h2>FFmpeg-Log</h2><pre id="logs">Noch keine Meldungen.</pre></section></main><script src="/static/app.js"></script></body></html>
