<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/static/style.css"><title>Einstellungen</title></head><body><header><h1>Einstellungen</h1><nav><a href="/">Dashboard</a></nav></header><main><section class="card">{% if message %}<p class="success">{{ message }}</p>{% endif %}<form method="post"><label>YouTube Stream-Key<input type="password" name="stream_key" value="{{ config.stream.stream_key }}" required></label><label>Video-Gerät<input name="video_device" value="{{ config.stream.video_device }}" required></label><label>Audio-Gerät<input name="audio_device" value="{{ config.stream.audio_device }}" required></label><label>FPS<select name="fps"><option {% if config.stream.fps == 25 %}selected{% endif %}>25</option><option {% if config.stream.fps == 30 %}selected{% endif %}>30</option></select></label><label>Video-Bitrate<input name="video_bitrate" value="{{ config.stream.video_bitrate }}" required></label><label class="check"><input type="checkbox" name="autostart" {% if config.stream.autostart %}checked{% endif %}> Stream nach Dienststart automatisch starten</label><label>Neues Web-Passwort (leer = unverändert)<input type="password" name="password"></label><button type="submit">Speichern</button></form><p class="muted">Audio-Geräte anzeigen: <code>arecord -L</code> · Kameraformate: <code>v4l2-ctl --list-formats-ext -d /dev/video0</code></p></section></main></body></html>
